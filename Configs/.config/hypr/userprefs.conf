# See https://wiki.hyprland.org/Configuring/Window-Rules/
$&=override
windowrule = opacity 1 $& 1 $& 1 $&,class:^(.*)$

# modals
windowrulev2 = float,class:^(1Password)$
windowrulev2 = float,class:^(org.kde.dolphin)$
windowrulev2 = dimaround,title:^(Quick Access — 1Password)$ 
windowrulev2 = size 800 600,class:^(org.pulseaudio.pavucontrol)$
windowrulev2 = size 800 600,class:^(pavucontrol)$

# windowrule = workspace 9,class:^(discord)$ # Discord-Electron
windowrule = workspace 10,class:^(.*[Ss]potify.*)$ # Spotify
windowrule = noscreenshare,class:^(1Password)$ 
windowrule = noscreenshare 1,title:^(Quick Access — 1Password)$ 
windowrule = noscreenshare 1,title:^(Friends - Discord)$ 
windowrule = noscreenshare 1,title:^(.*Jjamppong.*)$ 
windowrule = noscreenshare 1,class:^(com.obsproject.Studio)$ 
windowrule = noscreenshare 1,title:^(nvim .*\.env.*)$ 
windowrule = noscreenshare 1,title:^(.*[Mm]ail — Zen Browser)$ 
windowrule = noscreenshare 1,title:^(Finance - Google Sheets.*)$ 
windowrule = noscreenshare 1,title:^(.*Facebook — Zen Browser)$ 
windowrule = noscreenshare 1,title:^(.* Supabase — Zen Browser)$ 
